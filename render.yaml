services:
  - type: web
    name: splitstudy
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: GOOGLE_SEARCH_API_KEY
        sync: false # Set this in Render Dashboard
